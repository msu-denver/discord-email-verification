# CI workflow — runs tests on PRs and pushes; deploy job is gated to
# main + push and uses OIDC (no long-lived AWS keys).
#
# Hardening:
#   - Top-level `permissions: contents: read` — least-privilege GITHUB_TOKEN.
#     Each job opts in to anything more.
#   - Actions pinned to commit SHAs (not tags) to defend against compromised
#     action releases. Comments next to each show the human-readable version.
#   - `npm ci --ignore-scripts` in the install step — blocks malicious
#     postinstall scripts.
#   - `npm audit` runs as a warning but does not fail the build (yet).
#   - Deploy job is gated to `github.ref == 'refs/heads/main' && github.event_name == 'push'`
#     so it cannot run on a PR (and especially not a fork PR).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default permissions for all jobs: read-only.
# Jobs that need more (e.g., id-token: write for OIDC) opt in explicitly.
permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # Test job — runs on every PR and every push to main.
  # No AWS access, no secrets, no write permissions.
  # ------------------------------------------------------------------
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # --ignore-scripts blocks malicious postinstall scripts in dependencies.
      # CI is a high-value target for supply-chain attackers, so we don't
      # let any package run arbitrary code during install.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        if: matrix.node-version == 22
        run: npm run test:coverage

      # Surface known CVEs in production dependencies. The script uses
      # --omit=dev --audit-level=high so a single transitive moderate
      # issue won't block CI — only high or critical CVEs in deps that
      # ship to production. We've established a clean baseline (0 vulns
      # as of vitest 4 / dotenv 17 / SDK upgrades) so this can fail builds.
      - name: Audit dependencies
        if: matrix.node-version == 22
        run: npm run audit

  # ------------------------------------------------------------------
  # Dependency review — fails the build if a PR introduces dependencies
  # with known high/critical CVEs or with non-allowlisted licenses. This
  # complements `npm audit` (which is post-hoc) by surfacing supply-chain
  # issues at the moment they're being introduced. PR-only by design;
  # the action requires the base/head ref pair.
  # ------------------------------------------------------------------
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Review dependency changes
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4.9.0
        with:
          fail-on-severity: high
          # Permissive license allowlist suitable for a public MIT project.
          # ISC/BSD/Apache/MIT family + the unlicensed/CC0 variants OSS Node
          # packages commonly use. Anything outside this list flags review.
          allow-licenses: 0BSD, BSD-2-Clause, BSD-3-Clause, ISC, MIT, Apache-2.0, CC0-1.0, Unlicense, BlueOak-1.0.0
          comment-summary-in-pr: on-failure

  # ------------------------------------------------------------------
  # Lint / syntax check
  # ------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check for syntax errors
        run: node --check src/*.js src/commands/*.js

  # ------------------------------------------------------------------
  # Deploy job
  #
  # Runs only on push to main (after merge). Three sequential steps:
  #   1. Build Dockerfile.ecs and push to ECR with main-<sha> + latest tags
  #   2. SSM Run Command on the EC2 instance to pull the new image and
  #      restart the container
  #
  # Critical guards (any one failure blocks the deploy):
  #   - Workflow `if: github.ref == 'refs/heads/main' && github.event_name == 'push'`
  #     gate (never runs on a PR or fork PR)
  #   - GitHub production environment: deployment branches restricted to main
  #   - AWS trust policy: `sub` claim must be `repo:.../environment:production`
  #   - AWS trust policy: `ref` claim must be `refs/heads/main`
  #   - `permissions: id-token: write, contents: read` — minimal token scope
  #   - No `secrets.*` references — only `vars.*` (non-sensitive ARNs)
  #
  # The deploy role has tightly scoped permissions: ECR push to the bot
  # repo only; ssm:SendCommand to ONE specific instance and ONE specific
  # SSM document; NO ssm:GetParameter (cannot read bot token even if
  # CI is compromised).
  # ------------------------------------------------------------------
  deploy:
    name: Deploy to AWS
    needs: [test, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production

    permissions:
      id-token: write   # required to mint OIDC token
      contents: read    # required for actions/checkout

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0

      - name: Login to ECR
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          ECR_REPOSITORY_URI: ${{ vars.ECR_REPOSITORY_URI }}
        run: ./scripts/build/aws-cli-login.sh

      - name: Build and push to ECR
        env:
          ECR_REPOSITORY_URI: ${{ vars.ECR_REPOSITORY_URI }}
          GIT_SHA: ${{ github.sha }}
        run: ./scripts/build/push-to-ecr.sh

      - name: Deploy to EC2 via SSM
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
          IMAGE_TAG: main-${{ github.sha }}
        run: |
          # Use the short SHA tag so the on-instance pull matches the
          # immutable tag we just pushed (rather than `latest`, which
          # is mutable and might briefly point to a different image).
          export IMAGE_TAG="main-$(echo "${{ github.sha }}" | cut -c1-7)"
          ./scripts/build/deploy-to-ec2.sh
