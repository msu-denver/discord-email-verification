# CI workflow — runs tests on PRs and pushes; deploy job is gated to
# main + push and uses OIDC (no long-lived AWS keys).
#
# Hardening:
#   - Top-level `permissions: contents: read` — least-privilege GITHUB_TOKEN.
#     Each job opts in to anything more.
#   - Actions pinned to commit SHAs (not tags) to defend against compromised
#     action releases. Comments next to each show the human-readable version.
#   - `npm ci --ignore-scripts` in the install step — blocks malicious
#     postinstall scripts.
#   - `npm audit` runs as a warning but does not fail the build (yet).
#   - Deploy job is gated to `github.ref == 'refs/heads/main' && github.event_name == 'push'`
#     so it cannot run on a PR (and especially not a fork PR).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default permissions for all jobs: read-only.
# Jobs that need more (e.g., id-token: write for OIDC) opt in explicitly.
permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # Test job — runs on every PR and every push to main.
  # No AWS access, no secrets, no write permissions.
  # ------------------------------------------------------------------
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # --ignore-scripts blocks malicious postinstall scripts in dependencies.
      # CI is a high-value target for supply-chain attackers, so we don't
      # let any package run arbitrary code during install.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        if: matrix.node-version == 22
        run: npm run test:coverage

      # Surface known CVEs in dependencies. Warn-only for now to avoid
      # flakiness from transitive issues. Tighten to fail-on-high once
      # we've established a baseline.
      - name: Audit dependencies
        if: matrix.node-version == 22
        run: npm run audit
        continue-on-error: true

  # ------------------------------------------------------------------
  # Lint / syntax check
  # ------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check for syntax errors
        run: node --check src/*.js src/commands/*.js

  # ------------------------------------------------------------------
  # Build & push to ECR job
  #
  # Runs only on push to main (after merge). Builds Dockerfile.ecs and
  # pushes to ECR with two tags:
  #   - main-<short-sha>  immutable rollback target
  #   - latest            mutable, pulled by EC2 on deploy
  #
  # Critical guards:
  #   - `if: github.ref == 'refs/heads/main' && github.event_name == 'push'`
  #     ensures this never runs on a PR (especially not a fork PR).
  #   - `permissions: id-token: write, contents: read` — only what's
  #     needed to mint an OIDC token and check out the repo.
  #   - The AWS deploy role's trust policy further restricts
  #     `sub: repo:msu-denver/...:ref:refs/heads/main`, so even if this
  #     job ran from a fork PR somehow, AWS would reject the assumeRole.
  #   - No `secrets.*` references — we use only repo variables (vars.*),
  #     which are non-sensitive ARNs.
  #
  # SSM RunCommand (to actually deploy onto an EC2 instance) lands in
  # Phase 9, after the EC2 instance exists.
  # ------------------------------------------------------------------
  push-to-ecr:
    name: Build and push to ECR
    needs: [test, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production

    permissions:
      id-token: write   # required to mint OIDC token
      contents: read    # required for actions/checkout

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37  # v6.1.0
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0

      - name: Login to ECR
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          ECR_REPOSITORY_URI: ${{ vars.ECR_REPOSITORY_URI }}
        run: ./scripts/build/aws-cli-login.sh

      - name: Build and push to ECR
        env:
          ECR_REPOSITORY_URI: ${{ vars.ECR_REPOSITORY_URI }}
          GIT_SHA: ${{ github.sha }}
        run: ./scripts/build/push-to-ecr.sh
